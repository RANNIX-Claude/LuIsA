<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LUISA — Inteligencia Clínica</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #F5F7FA; color: #0F172A; }

    #splash { position: fixed; inset: 0; background: linear-gradient(135deg, #050C1A, #00C9A7); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; }
    #splash.out { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
    .splash-brand { font-size: 2.8rem; font-weight: 900; color: #fff; }
    .splash-spin { width: 28px; height: 28px; border: 2.5px solid rgba(0,201,167,0.3); border-top-color: #00C9A7; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .header { background: #fff; border-bottom: 1px solid #E2E8F0; height: 52px; display: flex; align-items: center; padding: 0 16px; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 800; color: #050C1A; flex: 1; }
    .btn { padding: 8px 16px; background: #00C9A7; color: #fff; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #00A88C; }
    .btn-secondary { background: #fff; color: #00C9A7; border: 1.5px solid #00C9A7; }
    .btn-danger { background: #DC2626; }
    .btn-danger:hover { background: #B91C1C; }

    .body { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 240px; background: #fff; border-right: 1px solid #E2E8F0; overflow-y: auto; padding: 12px; }
    .pac-item { padding: 10px 12px; cursor: pointer; border-radius: 8px; margin-bottom: 6px; border-left: 3px solid transparent; }
    .pac-item:hover { background: #E6FAF7; }

    .main { flex: 1; overflow-y: auto; padding: 16px; }
    .card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .kpi-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 16px; text-align: center; }
    .kpi-value { font-size: 32px; font-weight: 800; color: #00C9A7; margin: 8px 0; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal.active { display: flex; }
    .modal-card { background: #fff; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-card h2 { margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }

    .recording { text-align: center; padding: 32px 0; }
    .recording-dot { width: 12px; height: 12px; background: #DC2626; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .recording-status { margin: 12px 0; font-size: 14px; font-weight: 600; }

    .soap-result { background: #F8FAFC; border-left: 4px solid #00C9A7; padding: 12px; border-radius: 6px; margin: 8px 0; }
    .soap-label { font-weight: 700; color: #00C9A7; font-size: 12px; text-transform: uppercase; }
    .soap-text { margin-top: 6px; font-size: 14px; line-height: 1.5; }

    .loading { text-align: center; padding: 20px; color: #94A3B8; }
    .error { background: #FEE2E2; border-left: 4px solid #DC2626; padding: 12px; border-radius: 6px; color: #991B1B; }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-brand">LU<span style="color: #00C9A7;">I</span>SA</div>
    <div style="color: rgba(255,255,255,0.5); font-size: 13px;">Inteligencia Clínica</div>
    <div class="splash-spin"></div>
  </div>

  <div class="app" style="display: none;">
    <header class="header">
      <h1>LUISA — Inteligencia Clínica</h1>
      <div style="flex: 1;"></div>
      <span id="medico-name" style="font-size: 13px; font-weight: 600;"></span>
      <button class="btn btn-secondary" onclick="logout()">Salir</button>
    </header>

    <div class="body">
      <aside class="sidebar">
        <button class="btn" onclick="openDictation()" style="width: 100%; margin-bottom: 12px;">🎤 Iniciar Dictación</button>
        <div id="pacientes-list"></div>
      </aside>

      <main class="main" id="main-content">
        <div style="text-align: center; padding: 48px 16px; color: #94A3B8;">
          <div style="font-size: 48px; margin-bottom: 12px;">👈</div>
          <div style="font-size: 16px; font-weight: 600;">Cargando...</div>
        </div>
      </main>
    </div>
  </div>

  <!-- MODAL DICTACIÓN -->
  <div id="dictation-modal" class="modal">
    <div class="modal-card" style="position: relative;">
      <button class="modal-close" onclick="closeDictation()">✕</button>
      <h2>
        <span id="dict-status-icon">🎤</span>
        <span id="dict-status-text">Preparando dictación...</span>
      </h2>

      <div id="dict-recording" class="recording" style="display: none;">
        <div style="font-size: 48px; margin-bottom: 12px;">
          <span class="recording-dot"></span>
        </div>
        <div class="recording-status">Grabando...</div>
        <p id="dict-interim" style="color: #6B8BAE; font-size: 14px; margin: 12px 0; font-style: italic; min-height: 40px; max-height: 120px; overflow-y: auto;">Escuchando...</p>
        <button class="btn btn-danger" onclick="stopDictation()" style="margin-top: 12px;">⏹ Detener</button>
      </div>

      <div id="dict-processing" style="display: none;">
        <div class="loading">
          <div style="font-size: 32px; animation: spin 2s linear infinite;">⚙️</div>
          <div style="margin-top: 12px;">Analizando con IA...</div>
        </div>
      </div>

      <div id="dict-result" style="display: none;">
        <div style="margin-bottom: 16px;">
          <strong>Texto dictado:</strong>
          <p id="dict-full-text" style="background: #F8FAFC; padding: 12px; border-radius: 6px; margin-top: 6px; max-height: 150px; overflow-y: auto;"></p>
        </div>

        <div style="margin-bottom: 16px;">
          <strong style="color: #00C9A7;">📋 Análisis SOAP:</strong>
          <div id="dict-soap"></div>
        </div>

        <div style="display: flex; gap: 8px;">
          <button class="btn" onclick="saveDictation()" style="flex: 1;">💾 Guardar Nota</button>
          <button class="btn btn-secondary" onclick="closeDictation()" style="flex: 1;">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://kcpooneuqdbdavgivbdp.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjcG9vbmV1cWRiZGF2Z2l2YmRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTE3NDgsImV4cCI6MjA5NzA4Nzc0OH0.dWOhArXA8rv0Jzm-gajRlXtPkuwEg66GNF1YdygidNM';

    async function supabaseApi(table, filters = '') {
      const url = `${SUPABASE_URL}/rest/v1/${table}${filters}`;
      const res = await fetch(url, {
        headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
      });
      if (!res.ok) throw new Error(`${res.status}`);
      return await res.json();
    }

    let currentMedico = null;
    let recognition = null;
    let isRecording = false;
    let dictatedText = '';

    async function checkSession() {
      const session = localStorage.getItem('luisa_session');
      if (!session) {
        window.location.href = '/auth.html';
        return;
      }
      const user = JSON.parse(session).user;
      currentMedico = user;
      document.getElementById('medico-name').textContent = user.nombre;
      await loadDashboard();
      document.querySelector('.app').style.display = 'flex';
      document.getElementById('splash').classList.add('out');
      setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
      initRecognition();
    }

    async function loadDashboard() {
      const medId = currentMedico.id;
      try {
        const hoy = new Date();
        const inicio = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate()).toISOString();
        const fin = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate() + 1).toISOString();

        const [citas, pacientes] = await Promise.all([
          supabaseApi('citas', `?id_medico=eq.${medId}&fecha_hora=gte.${inicio}&fecha_hora=lt.${fin}&order=fecha_hora`),
          supabaseApi('doctor_patient_relationships', `?id_medico=eq.${medId}&activo=eq.true`)
        ]);

        const html = `
          <div class="kpi-grid">
            <div class="kpi-card">
              <div style="font-size: 12px; font-weight: 600; color: #6B8BAE; text-transform: uppercase;">📅 Citas Hoy</div>
              <div class="kpi-value">${citas.length}</div>
              <div style="font-size: 12px; color: #94A3B8;">${citas.filter(c => c.estado !== 'completada').length} pendientes</div>
            </div>
            <div class="kpi-card">
              <div style="font-size: 12px; font-weight: 600; color: #6B8BAE; text-transform: uppercase;">👥 Pacientes</div>
              <div class="kpi-value">${pacientes.length}</div>
              <div style="font-size: 12px; color: #94A3B8;">asignados a ti</div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">🗓️ Agenda del Día</div>
            ${citas.length === 0 ? '<p style="text-align: center; color: #94A3B8; padding: 20px;">Sin citas programadas</p>' :
              citas.map(c => {
                const hora = new Date(c.fecha_hora).toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});
                return `<div style="padding: 8px 0; border-bottom: 1px solid #E2E8F0;">
                  <strong>${hora}</strong> — ${c.tipo_consulta || 'Consulta'}
                </div>`;
              }).join('')
            }
          </div>
        `;
        document.getElementById('main-content').innerHTML = html;
        document.getElementById('pacientes-list').innerHTML = pacientes.map(p =>
          `<div class="pac-item" style="cursor: pointer;">Paciente ${p.id_paciente.substring(0, 8)}...</div>`
        ).join('');
      } catch (e) {
        console.error('Error:', e);
        document.getElementById('main-content').innerHTML = `<div class="error">${e.message}</div>`;
      }
    }

    function initRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        console.warn('Web Speech API no disponible. Usa Chrome.');
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onstart = () => {
        isRecording = true;
        dictatedText = '';
        document.getElementById('dict-recording').style.display = 'block';
        document.getElementById('dict-processing').style.display = 'none';
        document.getElementById('dict-result').style.display = 'none';
        document.getElementById('dict-status-icon').textContent = '🎤';
        document.getElementById('dict-status-text').textContent = 'Grabando...';
      };

      recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const transcript = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            dictatedText += transcript + ' ';
          } else {
            interim += transcript;
          }
        }
        document.getElementById('dict-interim').textContent = dictatedText + interim || 'Escuchando...';
      };

      recognition.onend = async () => {
        isRecording = false;
        if (dictatedText.trim()) {
          await processDictation();
        }
      };

      recognition.onerror = (e) => {
        document.getElementById('dict-result').innerHTML = `<div class="error">Error: ${e.error}</div>`;
      };
    }

    function openDictation() {
      document.getElementById('dictation-modal').classList.add('active');
      document.getElementById('dict-recording').style.display = 'none';
      document.getElementById('dict-processing').style.display = 'none';
      document.getElementById('dict-result').style.display = 'none';
      if (recognition && !isRecording) {
        recognition.start();
      }
    }

    function stopDictation() {
      if (recognition && isRecording) {
        recognition.stop();
      }
    }

    function closeDictation() {
      if (recognition && isRecording) {
        recognition.stop();
      }
      document.getElementById('dictation-modal').classList.remove('active');
      dictatedText = '';
    }

    async function processDictation() {
      document.getElementById('dict-recording').style.display = 'none';
      document.getElementById('dict-processing').style.display = 'block';
      document.getElementById('dict-status-icon').textContent = '⚙️';
      document.getElementById('dict-status-text').textContent = 'Analizando con IA...';

      try {
        const res = await fetch('/.netlify/functions/claude', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1024,
            system: `Eres un asistente médico experto. Extrae la información del texto dictado y estructura en formato SOAP:
- S (Subjetivo): síntomas, quejas del paciente
- O (Objetivo): signos vitales, hallazgos físicos
- A (Análisis): diagnóstico, interpretación
- P (Plan): tratamiento, recomendaciones

Responde SOLO con JSON válido (sin markdown):
{
  "subjetivo": "...",
  "objetivo": "...",
  "analisis": "...",
  "plan": "..."
}`,
            messages: [{
              role: 'user',
              content: `Texto dictado por el médico:\n\n"${dictatedText}"`
            }]
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'Error en Claude API');

        let soapJson = {};
        try {
          soapJson = JSON.parse(data.content[0].text);
        } catch {
          soapJson = { error: 'No se pudo parsear SOAP', text: data.content[0].text };
        }

        document.getElementById('dict-full-text').textContent = dictatedText;
        document.getElementById('dict-soap').innerHTML = `
          <div class="soap-result">
            <div class="soap-label">Subjetivo (S)</div>
            <div class="soap-text">${soapJson.subjetivo || '—'}</div>
          </div>
          <div class="soap-result">
            <div class="soap-label">Objetivo (O)</div>
            <div class="soap-text">${soapJson.objetivo || '—'}</div>
          </div>
          <div class="soap-result">
            <div class="soap-label">Análisis (A)</div>
            <div class="soap-text">${soapJson.analisis || '—'}</div>
          </div>
          <div class="soap-result">
            <div class="soap-label">Plan (P)</div>
            <div class="soap-text">${soapJson.plan || '—'}</div>
          </div>
        `;

        document.getElementById('dict-processing').style.display = 'none';
        document.getElementById('dict-result').style.display = 'block';
        document.getElementById('dict-status-icon').textContent = '✅';
        document.getElementById('dict-status-text').textContent = 'Análisis completado';
      } catch (e) {
        console.error('Error procesando:', e);
        document.getElementById('dict-result').innerHTML = `<div class="error">Error: ${e.message}</div>`;
        document.getElementById('dict-processing').style.display = 'none';
        document.getElementById('dict-result').style.display = 'block';
      }
    }

    function saveDictation() {
      alert('Nota guardada:\n\n' + dictatedText.substring(0, 100) + '...\n\n(Guardar en BD — próximamente)');
      closeDictation();
    }

    function logout() {
      localStorage.removeItem('luisa_session');
      window.location.href = '/auth.html';
    }

    checkSession();
  </script>
</body>
</html>
