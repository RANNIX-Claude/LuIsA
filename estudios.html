<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LUISA — Análisis de Estudios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: #F5F7FA; color: #0F172A; }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    .header { background: #fff; border-bottom: 1px solid #E2E8F0; padding: 16px; margin-bottom: 20px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 24px; font-weight: 800; }
    .btn { padding: 10px 20px; background: #00C9A7; color: #fff; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn:hover { background: #00A88C; }
    .btn-secondary { background: #fff; color: #00C9A7; border: 1.5px solid #00C9A7; }

    .card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

    .drop-zone { border: 2px dashed #00C9A7; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #E6FAF7; }
    .drop-zone:hover { background: #D0F5F0; }
    .drop-zone.over { background: #B8F1E8; border-color: #00A88C; }
    .drop-zone-icon { font-size: 48px; margin-bottom: 12px; }

    .file-info { background: #E6FAF7; border-left: 4px solid #00C9A7; padding: 12px; border-radius: 6px; margin: 12px 0; display: flex; align-items: center; justify-content: space-between; }
    .file-name { font-weight: 600; }

    .loading { text-align: center; padding: 32px; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(0,201,167,0.2); border-top-color: #00C9A7; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .analysis-result { background: #F8FAFC; padding: 16px; border-radius: 8px; margin: 12px 0; border-left: 4px solid #00C9A7; }
    .analysis-label { font-weight: 700; color: #00C9A7; font-size: 12px; text-transform: uppercase; }
    .analysis-text { margin-top: 8px; font-size: 14px; line-height: 1.5; }

    .value-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #E2E8F0; }
    .value-name { font-weight: 600; }
    .value-status { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }
    .status-normal { background: #E8F5E9; color: #1b5e20; }
    .status-alto { background: #FFF3E0; color: #E65100; }
    .status-bajo { background: #E3F2FD; color: #1565C0; }
    .status-critico { background: #FFEBEE; color: #b71c1c; }

    .error { background: #FFEBEE; border-left: 4px solid #DC2626; padding: 12px; border-radius: 6px; color: #991B1B; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <div class="container">
    <div class="header">
      <h1>🧪 Análisis IA de Estudios</h1>
      <a href="/app.html" class="btn btn-secondary">← Volver</a>
    </div>

    <div class="card">
      <div class="card-title">Subir Resultado de Laboratorio (PDF)</div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-zone-icon">📄</div>
        <div style="font-weight: 600; margin-bottom: 4px;">Arrastra un PDF aquí o haz click</div>
        <div style="font-size: 12px; color: #6B8BAE;">Soporta PDF con resultados de laboratorio</div>
      </div>
      <input type="file" id="fileInput" accept=".pdf" style="display: none;" onchange="handleFileSelect(event)"/>
      <div id="fileInfo" style="display: none;">
        <div class="file-info">
          <div>
            <div class="file-name" id="fileName"></div>
            <div style="font-size: 12px; color: #6B8BAE; margin-top: 4px;" id="fileSize"></div>
          </div>
          <button class="btn" onclick="analyzeFile()">🚀 Analizar</button>
        </div>
      </div>
    </div>

    <div id="result" style="display: none;">
      <div class="card">
        <div class="card-title">📊 Análisis de Resultados</div>
        <div id="resultContent"></div>
      </div>
    </div>

    <div id="loading" style="display: none;">
      <div class="card">
        <div class="loading">
          <div class="spinner"></div>
          <div style="margin-top: 12px; color: #6B8BAE;">Analizando PDF con IA...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let selectedFile = null;

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('over');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('over');
      const files = e.dataTransfer.files;
      if (files.length > 0 && files[0].type === 'application/pdf') {
        selectedFile = files[0];
        showFileInfo();
      } else {
        alert('Por favor, sube un archivo PDF');
      }
    });

    function handleFileSelect(e) {
      const files = e.target.files;
      if (files.length > 0) {
        selectedFile = files[0];
        showFileInfo();
      }
    }

    function showFileInfo() {
      document.getElementById('fileName').textContent = selectedFile.name;
      document.getElementById('fileSize').textContent = (selectedFile.size / 1024).toFixed(2) + ' KB';
      document.getElementById('fileInfo').style.display = 'block';
      document.getElementById('result').style.display = 'none';
    }

    async function analyzeFile() {
      if (!selectedFile) return;

      document.getElementById('fileInfo').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      try {
        // Extraer texto del PDF
        const arrayBuffer = await selectedFile.arrayBuffer();
        pdfjsLib.getDocument(arrayBuffer).promise.then(async (pdf) => {
          let pdfText = '';
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            pdfText += textContent.items.map(item => item.str).join(' ') + '\n';
          }

          // Enviar texto a Claude para análisis
          const res = await fetch('/.netlify/functions/claude', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 2000,
              system: `Eres un médico especialista en análisis de laboratorio. Examina el resultado y:
1. Extrae TODOS los valores de laboratorio
2. Identifica qué valores están fuera de rango (alto, bajo, crítico)
3. Proporciona interpretación clínica breve
4. Recomienda seguimiento si es necesario

Responde SOLO en JSON (sin markdown):
{
  "titulo": "Nombre del estudio",
  "valores": [
    { "nombre": "Hemoglobina", "valor": "15.2", "unidad": "g/dL", "rango_normal": "12-16", "estado": "normal" },
    ...
  ],
  "interpretacion": "Breve análisis clínico",
  "recomendaciones": "Qué hacer con estos resultados",
  "critico": false
}`,
              messages: [{
                role: 'user',
                content: `Resultado de laboratorio:\n\n${pdfText}`
              }]
            })
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.error?.message || 'Error en análisis');

          let result = {};
          try {
            result = JSON.parse(data.content[0].text);
          } catch {
            result = { error: 'No se pudo parsear resultado', text: data.content[0].text };
          }

          displayResult(result);
        });
      } catch (e) {
        console.error('Error:', e);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('resultContent').innerHTML = `<div class="error">Error: ${e.message}</div>`;
      }
    }

    function displayResult(result) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';

      const statusColor = (estado) => {
        if (estado === 'critico') return 'status-critico';
        if (estado === 'alto') return 'status-alto';
        if (estado === 'bajo') return 'status-bajo';
        return 'status-normal';
      };

      let html = '';

      if (result.titulo) {
        html += `<h3 style="margin-bottom: 12px; color: #00C9A7;">${result.titulo}</h3>`;
      }

      if (result.valores && Array.isArray(result.valores)) {
        html += '<div style="margin-bottom: 16px;">';
        result.valores.forEach(v => {
          html += `
            <div class="value-item">
              <div>
                <div class="value-name">${v.nombre}</div>
                <div style="font-size: 12px; color: #6B8BAE;">${v.valor} ${v.unidad}</div>
              </div>
              <div style="text-align: right;">
                <div class="value-status ${statusColor(v.estado)}">${v.estado.toUpperCase()}</div>
                <div style="font-size: 11px; color: #94A3B8; margin-top: 4px;">Rango: ${v.rango_normal}</div>
              </div>
            </div>
          `;
        });
        html += '</div>';
      }

      if (result.interpretacion) {
        html += `
          <div class="analysis-result">
            <div class="analysis-label">📋 Interpretación</div>
            <div class="analysis-text">${result.interpretacion}</div>
          </div>
        `;
      }

      if (result.recomendaciones) {
        html += `
          <div class="analysis-result">
            <div class="analysis-label">💊 Recomendaciones</div>
            <div class="analysis-text">${result.recomendaciones}</div>
          </div>
        `;
      }

      if (result.critico) {
        html = `<div class="error" style="margin-bottom: 16px;">⚠️ RESULTADOS CRÍTICOS - Contacta al médico de inmediato</div>` + html;
      }

      document.getElementById('resultContent').innerHTML = html;
    }
  </script>
</body>
</html>
