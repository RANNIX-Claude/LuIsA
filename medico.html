<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LUISA — Panel Médico</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #050C1A;
      --teal: #00C9A7;
      --teal-dark: #00A88C;
      --teal-light: #E6FAF7;
      --bg: #F5F7FA;
      --white: #ffffff;
      --border: #E2E8F0;
      --text: #64748B;
      --dark: #0F172A;
      --rojo: #DC2626;
      --shadow: 0 1px 3px rgba(0,0,0,0.07);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased}

    .header{background:var(--white);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 20px;gap:20px;box-shadow:var(--shadow)}
    .logo{font-size:20px;font-weight:900;color:var(--navy)}
    .logo .ia{color:var(--teal)}
    .spacer{flex:1}
    .header-info{display:flex;align-items:center;gap:12px;text-align:right}
    .medico-nombre{font-size:13px;font-weight:700;color:var(--dark)}
    .medico-esp{font-size:11px;color:var(--text)}
    .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--navy));display:flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:14px}
    .btn{padding:6px 16px;border:1.5px solid var(--border);border-radius:20px;background:var(--white);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
    .btn:hover{border-color:var(--teal);color:var(--teal)}

    .container{display:flex;flex:1;overflow:hidden}
    .sidebar{width:250px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column}
    .sidebar input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:20px;margin-bottom:16px;font-size:13px}
    .btn-nuevo{width:100%;padding:10px;background:var(--teal);color:var(--white);border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-bottom:16px}
    .btn-nuevo:hover{background:var(--teal-dark)}

    .sidebar-label{font-size:10px;font-weight:700;color:var(--text);text-transform:uppercase;margin-bottom:8px;margin-top:16px}
    .pac-list{flex:1;overflow-y:auto}
    .pac-item{padding:10px;margin-bottom:6px;border-radius:8px;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
    .pac-item:hover{background:var(--teal-light)}
    .pac-item.activo{background:var(--teal-light);border-left-color:var(--teal)}
    .pac-avatar{width:32px;height:32px;border-radius:50%;background:var(--teal);display:inline-flex;align-items:center;justify-content:center;color:var(--white);font-weight:700;font-size:12px;margin-right:10px}
    .pac-info{display:inline-block;vertical-align:middle}
    .pac-nombre{font-size:13px;font-weight:600;color:var(--dark)}
    .pac-edad{font-size:11px;color:var(--text)}

    .main{flex:1;overflow-y:auto;padding:24px}
    .card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
    .card-title{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:16px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .info-item{padding:12px;background:var(--teal-light);border-radius:8px}
    .info-label{font-size:10px;font-weight:700;color:var(--teal-dark);text-transform:uppercase}
    .info-value{font-size:16px;font-weight:700;color:var(--dark);margin-top:4px}

    .empty{text-align:center;padding:60px 20px;color:var(--text)}
    .empty-icon{font-size:48px;margin-bottom:16px}

    .version-tag{position:fixed;top:10px;right:10px;font-size:10px;background:rgba(0,201,167,.2);color:var(--teal);padding:4px 8px;border-radius:4px;z-index:10}
  </style>
</head>
<body>

<div class="version-tag">v.2025.06.17 22:25</div>

<div class="header">
  <div class="logo">LU<span class="ia">ISA</span></div>
  <div class="spacer"></div>
  <div class="header-info">
    <div>
      <div class="medico-nombre" id="medico-nombre">Dr. Médico</div>
      <div class="medico-esp" id="medico-esp">Especialista</div>
    </div>
    <div class="avatar" id="medico-avatar">MD</div>
    <button class="btn" onclick="logout()">Salir</button>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <input type="text" placeholder="Buscar paciente..." id="search-pac"/>
    <button class="btn-nuevo" onclick="irARegistro()">➕ Nuevo paciente</button>

    <div class="sidebar-label">PACIENTES</div>
    <div class="pac-list" id="pac-list">
      <div style="text-align:center;color:var(--text);font-size:12px;padding:20px">Cargando...</div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty">
      <div class="empty-icon">👤</div>
      <div>Selecciona un paciente para ver detalles</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
let currentMedico = null;
let pacientes = [];

async function init() {
  const sessionStr = localStorage.getItem('luisa_session');
  if (!sessionStr) {
    window.location.href = '/auth.html';
    return;
  }

  try {
    const session = JSON.parse(sessionStr);

    // Cargar médico
    const { data: medico } = await sb
      .from('medicos')
      .select('*')
      .eq('id_usuario', session.user.id)
      .single();

    if (medico) {
      currentMedico = medico;
      const nombre = (medico.nombre_completo || 'Dr. Médico').split(' ').slice(0, 2).join(' ');
      const initials = nombre.split(' ').map(w => w[0]).join('').toUpperCase();
      document.getElementById('medico-nombre').textContent = nombre;
      document.getElementById('medico-esp').textContent = medico.especialidad_nombre || 'Especialista';
      document.getElementById('medico-avatar').textContent = initials;

      // Cargar pacientes
      const { data: rels } = await sb
        .from('doctor_patient_relationships')
        .select('id_paciente')
        .eq('id_medico', medico.id);

      if (rels) {
        const { data: pacs } = await sb
          .from('perfiles_pacientes')
          .select('*')
          .in('id', rels.map(r => r.id_paciente));

        pacientes = pacs || [];
        renderPacientes();
      }
    }
  } catch(e) {
    console.error('Error:', e);
  }
}

function renderPacientes() {
  const list = document.getElementById('pac-list');
  if (!pacientes.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text);font-size:12px;padding:20px">Sin pacientes</div>';
    return;
  }

  list.innerHTML = pacientes.map(p => {
    const edad = p.fecha_nacimiento
      ? Math.floor((Date.now() - new Date(p.fecha_nacimiento)) / 31557600000)
      : '—';
    const iniciales = (p.nombre_completo || 'P')
      .split(' ')
      .slice(0, 2)
      .map(w => w[0])
      .join('')
      .toUpperCase();

    return `
      <div class="pac-item" onclick="selectPaciente('${p.id}')">
        <span class="pac-avatar">${iniciales}</span>
        <div class="pac-info">
          <div class="pac-nombre">${p.nombre_completo}</div>
          <div class="pac-edad">${edad} años</div>
        </div>
      </div>
    `;
  }).join('');
}

function selectPaciente(id) {
  document.querySelectorAll('.pac-item').forEach(el => el.classList.remove('activo'));
  event.currentTarget.classList.add('activo');

  const pac = pacientes.find(p => p.id === id);
  if (pac) {
    const edad = pac.fecha_nacimiento
      ? Math.floor((Date.now() - new Date(pac.fecha_nacimiento)) / 31557600000)
      : '—';

    document.getElementById('main').innerHTML = `
      <div class="card">
        <div class="card-title">👤 ${pac.nombre_completo}</div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Edad</div>
            <div class="info-value">${edad} años</div>
          </div>
          <div class="info-item">
            <div class="info-label">Sexo</div>
            <div class="info-value">${pac.sexo || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Teléfono</div>
            <div class="info-value">${pac.telefono || '—'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Alergias</div>
            <div class="info-value">No reportadas</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">💊 Medicamentos Activos</div>
        <div style="color:var(--text);font-size:13px">No hay medicamentos registrados</div>
      </div>
    `;
  }
}

function logout() {
  localStorage.removeItem('luisa_session');
  window.location.href = '/auth.html';
}

function irARegistro() {
  window.location.href = '/paciente-nuevo.html';
}

document.getElementById('search-pac').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  document.querySelectorAll('.pac-item').forEach(item => {
    const nombre = item.querySelector('.pac-nombre').textContent.toLowerCase();
    item.style.display = nombre.includes(query) ? '' : 'none';
  });
});

init();
</script>

</body>
</html>
