                  style={{padding:"8px 10px",border:"1.5px solid #E2EBF5",borderRadius:6,fontSize:13}}/>
                <input type="text" placeholder="Duración (7 días)"
                  value={m.duracion} onChange={e=>updateMed(i,'duracion',e.target.value)}
                  style={{padding:"8px 10px",border:"1.5px solid #E2EBF5",borderRadius:6,fontSize:13}}/>
              </div>
            </div>
          ))}
          <button className="btn-secondary" onClick={addMed} style={{width:"100%",marginBottom:14}}>
            + Agregar medicamento
          </button>

          <label style={{fontSize:11,fontWeight:600,color:"#607D99",letterSpacing:".05em",textTransform:"uppercase"}}>Indicaciones generales</label>
          <textarea value={indicaciones} onChange={e=>setIndicaciones(e.target.value)}
            placeholder="Ej: Tomar con agua, evitar alcohol, reposo relativo..."
            style={{width:"100%",padding:"10px 12px",border:"1.5px solid #E2EBF5",borderRadius:8,fontSize:13,minHeight:80,marginBottom:12,fontFamily:"inherit"}}/>

          <label style={{fontSize:11,fontWeight:600,color:"#607D99",letterSpacing:".05em",textTransform:"uppercase"}}>Próxima cita (opcional)</label>
          <input type="date" value={proximaCita} onChange={e=>setProximaCita(e.target.value)}
            style={{width:"100%",padding:"10px 12px",border:"1.5px solid #E2EBF5",borderRadius:8,fontSize:13,marginBottom:16}}/>

          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="btn-secondary" onClick={onClose}>Cancelar</button>
            <button className="btn-secondary" onClick={()=>generar(false)}>📥 Solo PDF</button>
            <button className="btn-primary" onClick={()=>generar(true)}>
              ✍️ Firmar y descargar
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ────────────────────────────────────────────────
function App(){
  const [medico,setMedico]         = useState(null);
  const [pacientes,setPacientes]   = useState([]);
  const [cargando,setCargando]     = useState(false);
  const [iniciando,setIniciando]   = useState(true);
  const [pac,setPac]               = useState(null);
  const [tab,setTab]               = useState("consulta");
  const [busq,setBusq]             = useState("");
  const [showNuevo,setShowNuevo]   = useState(false);
  const [nuevo,setNuevo]           = useState({nombre:"",edad:"",tel:""});
  const [secTextos,setSecTextos]   = useState({});
  const [secCampos,setSecCampos]   = useState({});
  const [guardando,setGuardando]   = useState(false);
  const [guardado,setGuardado]     = useState(false);
  const [showPerfil,setShowPerfil] = useState(false);
  const [showFirma,setShowFirma]   = useState(false);
  const [perfilEdit,setPerfilEdit] = useState({});
  const [showReceta,setShowReceta] = useState(false);

  useEffect(()=>{
    const s=document.getElementById("splash");
    if(s) setTimeout(()=>s.classList.add("out"),800);

    // Cargar médico desde Supabase Auth usando supabase-client.js
    (async () => {
      const session = await checkSession();
      if(!session) return; // checkSession redirige automáticamente a auth.html

      const medicoData = await getCurrentMedico();
      if(medicoData){
        setMedico({
          id:           medicoData.id,
          id_supabase:  medicoData.id,
          nombre:       medicoData.nombre_completo || 'Dr. Desconocido',
          especialidad: medicoData.especialidad_nombre || 'Medicina General',
          cedula:       medicoData.cedula_profesional || '',
          email:        session.user.email,
          foto:         medicoData.foto_url || null,
          firma:        medicoData.firma_digital || null,
          telefono:     medicoData.telefono || '',
          consultorio_nombre: medicoData.consultorio_nombre || '',
          consultorio_direccion: medicoData.consultorio_direccion || '',
          horario:      medicoData.horario_atencion || '',
        });
      } else {
        // Si no hay médico, crear uno de prueba
        console.warn('No se encontró perfil de médico en la base de datos');
        setMedico({
          id:           'temp-' + Date.now(),
          id_supabase:  'temp-' + Date.now(),
          nombre:       session.user.user_metadata?.full_name || 'Dr. Médico',
          especialidad: 'Medicina General',
          cedula:       'TEMP-' + Math.random().toString(36).substring(7).toUpperCase(),
          email:        session.user.email,
        });
        console.info('Usando perfil de médico temporal para demostración');
      }
      setIniciando(false);
    })();
  },[]);

  useEffect(()=>{ if(medico) cargarPacientes(); },[medico]);

  useEffect(()=>{
    if(pac){
      const base = pacientes.find(p=>p.id===pac.id);
      if(base) setPac(p=>({...base,historial:p?.historial||[]}));
      else setPac(null);
    }
  },[pacientes]);

  const cargarPacientes = async () => {
    if(!medico?.id_supabase) return;
    setCargando(true);
    try {
      const pacientesData = await getMedicoPatients(medico.id_supabase);
      setPacientes((pacientesData||[]).map(adaptarPaciente));
    } catch(e){
      console.error('Error cargando pacientes:', e.message);
      showError('Error al cargar la lista de pacientes');
    }
    setCargando(false);
  };

  if(iniciando || !medico) return null;

  const cargarHistorial = async (pacienteId) => {
    try {
      // Cargar notas de evolución del paciente
      const notasData = await getNotasEvolucion(pacienteId);
      const h = (notasData||[]).map(nota=>{
        let diagnosticos = [];
        try {
          diagnosticos = nota.diagnosticos_problemas_clinicos ? JSON.parse(nota.diagnosticos_problemas_clinicos) : [];
        } catch(e) { console.error('Error parsing diagnosticos:', e); }

        return {
          id:          nota.id,
          fecha:       nota.fecha_nota,
          diagnostico: diagnosticos[0]?.nombre || 'Consulta',
          campos:      {
            evolucion: nota.evolucion_cuadro_clinico,
            signos_vitales: nota.signos_vitales
          },
          dictado:     nota.evolucion_cuadro_clinico || ""
        };
      });
      setPac(p=>p?.id===pacienteId?{...p,historial:h}:p);
    } catch(e){
      console.error('Error cargando historial:', e.message);
      showError('Error al cargar el historial');
    }
  };

  const guardarConsulta = async () => {
    setGuardando(true);
    const dictadoCompleto = Object.values(secTextos).filter(Boolean).join(" ");
    try {
      // Crear nota de evolución con los datos de la consulta
      const nota = {
        id_paciente: pac.id,
        id_medico: medico.id_supabase,
        fecha_nota: new Date().toISOString(),
        evolucion_cuadro_clinico: secTextos.padecimiento || dictadoCompleto || 'Sin descripción',
        signos_vitales: secCampos.signos_vitales ? JSON.stringify(secCampos.signos_vitales) : null,
        diagnosticos_problemas_clinicos: secCampos.diagnostico ? JSON.stringify([{nombre: secCampos.diagnostico}]) : null,
        tratamiento_indicaciones: secCampos.tratamiento ? JSON.stringify([{medicamento: secCampos.tratamiento}]) : null,
        pronostico: 'favorable',
        firmado: false
      };

      const resultNota = await createNotaEvolucion(nota);
      if(!resultNota) throw new Error('No se pudo guardar la nota de evolución');

      showSuccess('Consulta guardada correctamente');
    } catch(e){
      showError('Error al guardar consulta: ' + e.message);
      setGuardando(false);
      return;
    }
    setGuardando(false);
    setGuardado(true);
    setTimeout(()=>{
      setGuardado(false);
      setSecTextos({});
      setSecCampos({});
      cargarHistorial(pac.id);
      setTab("historial");
    }, 1800);
  };

  const agregarPaciente = async () => {
    if(!nuevo.nombre.trim()) {
      showError('El nombre es obligatorio');
      return;
    }
    try {
      // 1. Crear usuario en usuarios_ligia
      const emailGenerado = nuevo.nombre.trim().toLowerCase()
        .replace(/\s+/g, '.')
        .replace(/[^a-z0-9.]/g, '')
        + '@temp.ligia.mx';

      const { data: usuario, error: errUsuario } = await sb
        .from('usuarios_ligia')
        .insert([{
          email: emailGenerado,
          nombre_completo: nuevo.nombre.trim(),
          rol: 'paciente',
          activo: true,
          documento_identidad: 'TEMP-' + Date.now(),
          documento_tipo: 'cedula'
        }])
        .select()
        .single();

      if (errUsuario) {
        console.error('Error usuario:', errUsuario);
        showError('Error creando usuario: ' + errUsuario.message);
        return;
      }

      // 2. Crear perfil_paciente
      const edadNum = nuevo.edad ? parseInt(nuevo.edad) : 0;
      const fechaNac = edadNum > 0
        ? new Date(Date.now() - edadNum * 365.25 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
        : null;

      const { data: perfil, error: errPerfil } = await sb
        .from('perfiles_pacientes')
        .insert([{
          id_usuario: usuario.id,
          nombre_completo: nuevo.nombre.trim(),
          edad: edadNum || null,
          fecha_nacimiento: fechaNac,
          sexo: 'M',
          perfil_completo_pct: 30
        }])
        .select()
        .single();

      if (errPerfil) {
        console.error('Error perfil:', errPerfil);
        showError('Error creando perfil: ' + errPerfil.message);
        return;
      }

      // 3. Crear relación médico-paciente
      if (medico && medico.id) {
        await sb.from('doctor_patient_relationships').insert([{
          id_medico: medico.id,
          id_paciente: perfil.id,
          activo: true
        }]);
      }

      // 4. Agregar a lista local
      const pacienteAdaptado = adaptarPaciente(perfil);
      setPacientes(prev => [pacienteAdaptado, ...prev]);

      showSuccess('Paciente "' + nuevo.nombre + '" agregado exitosamente');
      setNuevo({nombre:"",edad:"",tel:""});
      setShowNuevo(false);
    } catch(e){
      console.error('Error completo:', e);
      showError('Error al crear paciente: ' + (e.message || e));
    }
  };

  const pFiltrados = pacientes.filter(p=>p.nombre.toLowerCase().includes(busq.toLowerCase()));

  return (
    <div className="app">
      {/* HEADER */}
      <header className="header">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontFamily:"Inter,sans-serif",fontWeight:800,fontSize:"1.2rem",letterSpacing:"-.03em",lineHeight:1}}>
            <span style={{color:"#050C1A"}}>LU</span><span style={{color:"#00C9A7"}}>ISA</span>
          </span>
          <span className="badge-version">v1.0</span>
        </div>
        <div className="header-sep"/>
        <div className="header-medico">
          <div className="header-avatar-ini" style={{cursor:"pointer",overflow:"hidden",padding:0}} onClick={()=>setShowPerfil(true)} title="Editar perfil">
            {medico.foto
              ? <img src={medico.foto} alt={medico.nombre} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>
              : ini(medico.nombre)
            }
          </div>
          <div style={{display:"flex",flexDirection:"column",lineHeight:1.2,cursor:"pointer"}} onClick={()=>setShowPerfil(true)}>
            <span className="header-nombre">{medico.nombre}</span>
            {medico.especialidad&&<span style={{fontSize:10,color:"var(--gris-texto)"}}>{medico.especialidad}</span>}
          </div>
          <button className="btn-inicio" onClick={() => window.location.href = '/'}>← Inicio</button>
          <button className="btn-salir" onClick={logout}>Salir</button>
        </div>
      </header>

      <div className="body">
        {/* SIDEBAR */}
        <aside className="sidebar">
          <div className="sidebar-search">
            <input placeholder="Buscar paciente..." value={busq} onChange={e=>setBusq(e.target.value)}/>
          </div>
          <button className="btn-nuevo" onClick={()=>setShowNuevo(s=>!s)}>
            <span>+</span> Nuevo Paciente
          </button>

          {showNuevo&&(
            <div className="nuevo-form">
              {[["nombre","Nombre completo"],["edad","Edad"],["tel","Teléfono"]].map(([k,ph])=>(
                <input key={k} placeholder={ph} value={nuevo[k]}
                  onChange={e=>setNuevo(p=>({...p,[k]:e.target.value}))}/>
              ))}
              <div className="nuevo-form-btns">
                <button className="btn-guardar-pac" onClick={agregarPaciente}>Guardar</button>
                <button className="btn-cancelar-pac" onClick={()=>setShowNuevo(false)}>✕</button>
              </div>
            </div>
          )}

          <div className="sidebar-label">Pacientes ({pFiltrados.length})</div>
          <div className="sidebar-lista">
            {pFiltrados.map(p=>(
              <div key={p.id} className={`pac-item${pac?.id===p.id?" activo":""}`}
                onClick={()=>{setPac({...p,historial:[]});setTab("resumen");setSecTextos({});setSecCampos({});cargarHistorial(p.id);}}>
                <div className={`pac-avatar${pac?.id===p.id?" activo":""}`}>{ini(p.nombre)}</div>
                <div className="pac-info">
                  <div className="pac-nombre">{p.nombre}</div>
                  <div className="pac-meta">
                    {!p.expediente&&<span className="dot-critico"/>}
                    {p.expediente&&<span className="dot-ok"/>}
                    <span>{p.edad} años</span>
                    {p.historial?.length>0&&<span>· {p.historial.length} consulta{p.historial.length>1?"s":""}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </aside>

        {/* MAIN */}
        <main className="main">
          {!pac ? (
            <div className="empty-state">
              <div className="empty-icono">👈</div>
              <div className="empty-titulo">Selecciona un paciente</div>
              <div className="empty-sub">Elige un paciente del panel izquierdo para comenzar la consulta</div>
            </div>
          ):(
            <>
              {/* PACIENTE HEADER */}
              <div className="pac-header-card">
                <div className="pac-header-avatar">{ini(pac.nombre)}</div>
                <div className="pac-header-info">
                  <div className="pac-header-nombre">{pac.nombre}</div>
                  <div className="pac-header-meta">
                    {pac.edad} años {pac.tel&&`· 📱 ${pac.tel}`} · {pac.historial?.length||0} consulta(s)
                  </div>
                  {pac.expediente?.alergias&&(
                    <div className="pac-header-alerta">⚠️ Alergia: {pac.expediente.alergias}</div>
                  )}
                  {pac.expediente?.medicamentos_actuales&&(
                    <div style={{fontSize:11,color:"#555",marginTop:2}}>
                      💊 {pac.expediente.medicamentos_actuales.substring(0,60)}{pac.expediente.medicamentos_actuales.length>60?"...":""}
                    </div>
                  )}
                </div>
                <div className="pac-header-acciones">
                  {Object.values(secCampos).some(v=>v?.trim())&&(
                    <span style={{background:"#E8F5E9",color:var_verde,padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:700}}>
                      ✓ {Object.values(secCampos).filter(v=>v?.trim()).length} campos
                    </span>
                  )}
                </div>
              </div>

              {/* TABS */}
              <div className="card" style={{padding:0,overflow:'visible'}}>
                <div className="tabs">
                  {[["resumen","🏠 Resumen"],["libre","💬 Consulta Libre"],["consulta","📝 Estructurada"],["estudios","🧪 Estudios"],["historial",`📋 Historial${pac.historial?.length>0?" ("+pac.historial.length+")":""}`]].map(([k,l])=>(
                    <button key={k} className={`tab${tab===k?" activo":""}`} onClick={()=>setTab(k)}>{l}</button>
                  ))}
                </div>

                {/* ── TAB RESUMEN (NUEVO) ── */}
                {tab==="resumen"&&(
                  <div className="card-body">
                    {/* Cards de resumen */}
                    <div className="resumen-cards">
                      <div className="resumen-card">
                        <div className="resumen-card-icono">🩺</div>
                        <div className="resumen-card-label">Última consulta</div>
                        <div className="resumen-card-valor">
                          {pac.historial?.[0]
                            ? new Date(pac.historial[0].fecha).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})
                            : 'Sin consultas'}
                        </div>
                      </div>
                      <div className="resumen-card">
                        <div className="resumen-card-icono">📅</div>
                        <div className="resumen-card-label">Total consultas</div>
                        <div className="resumen-card-valor">{pac.historial?.length || 0}</div>
                      </div>
                      <div className="resumen-card">
                        <div className="resumen-card-icono">⚠️</div>
                        <div className="resumen-card-label">Alergias</div>
                        <div className="resumen-card-valor" style={{fontSize:13}}>
                          {pac.expediente?.alergias || 'Ninguna registrada'}
                        </div>
                      </div>
                      <div className="resumen-card">
                        <div className="resumen-card-icono">💊</div>
                        <div className="resumen-card-label">Medicamentos</div>
                        <div className="resumen-card-valor" style={{fontSize:13}}>
                          {pac.expediente?.medicamentos_actuales ? 'Con tratamiento' : 'Sin tratamiento activo'}
                        </div>
                      </div>
                    </div>

                    {/* Botones Acción */}
                    <div style={{margin:"20px 0 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                      <div style={{fontSize:16,fontWeight:700,color:"var(--gris-oscuro)"}}>📋 Consultas Anteriores</div>
                      <div style={{display:"flex",gap:8}}>
                        <button className="btn-secondary" onClick={()=>setShowReceta(true)}>
                          💊 Nueva Receta
                        </button>
                        <button className="btn-primary" onClick={()=>{setSecTextos({});setSecCampos({});setTab("consulta");}}>
                          + Nueva Consulta
                        </button>
                      </div>
                    </div>

                    {/* Tendencias signos vitales */}
                    {pac.historial?.length >= 2 && (() => {
                      const conSV = pac.historial.filter(h => h.signos_vitales).slice(0,5).reverse();
                      if(conSV.length < 2) return null;
                      const last = conSV[conSV.length-1].signos_vitales;
                      const prev = conSV[0].signos_vitales;
                      const flecha = (a, b) => {
                        if(!a || !b) return '';
                        if(a > b) return ' 📈';
                        if(a < b) return ' 📉';
                        return ' ➡️';
                      };
                      return (
                        <div style={{marginBottom:20,padding:14,background:"linear-gradient(135deg,#F0FFFD,#E6FAF7)",border:"1px solid #00C9A7",borderRadius:12}}>
                          <div style={{fontSize:13,fontWeight:700,color:"#0F1F3D",marginBottom:10}}>📈 Tendencias (últimas {conSV.length} consultas)</div>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,fontSize:12}}>
                            {last.ta_sistolica && (
                              <div><strong>TA:</strong> {prev.ta_sistolica}/{prev.ta_diastolica} → {last.ta_sistolica}/{last.ta_diastolica}{flecha(last.ta_sistolica, prev.ta_sistolica)}</div>
                            )}
                            {last.fc && <div><strong>FC:</strong> {prev.fc} → {last.fc} lpm{flecha(last.fc, prev.fc)}</div>}
                            {last.peso_kg && <div><strong>Peso:</strong> {prev.peso_kg} → {last.peso_kg} kg{flecha(last.peso_kg, prev.peso_kg)}</div>}
                            {last.temperatura && <div><strong>T°:</strong> {prev.temperatura} → {last.temperatura}°C</div>}
                          </div>
                        </div>
                      );
                    })()}

                    {/* Grid de consultas */}
                    {!pac.historial?.length ? (
                      <div className="empty-state" style={{padding:"40px 20px"}}>
                        <div className="empty-icono">📂</div>
                        <div className="empty-titulo">Sin consultas previas</div>
                        <div className="empty-sub">Inicia la primera consulta con el botón superior</div>
                      </div>
                    ) : (
                      <div className="consultas-grid">
                        {pac.historial.map((c,i)=>(
                          <div key={c.id} className="consulta-card" onClick={()=>setTab("consulta")}>
                            <div className="consulta-card-header">
                              <div className="consulta-card-fecha">
                                {new Date(c.fecha).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}
                              </div>
                              {i===0 && <span className="consulta-badge">Última</span>}
                            </div>
                            <div className="consulta-card-dx">
                              {c.diagnostico_principal || c.dx_principal || c.padecimiento_actual?.substring(0,80) || 'Consulta general'}
                            </div>
                            {c.signos_vitales && (
                              <div className="consulta-card-signos">
                                {c.signos_vitales.ta_sistolica && (
                                  <span>🩺 TA: {c.signos_vitales.ta_sistolica}/{c.signos_vitales.ta_diastolica}</span>
                                )}
                                {c.signos_vitales.fc && <span>❤️ FC: {c.signos_vitales.fc}</span>}
                                {c.signos_vitales.temperatura && <span>🌡️ {c.signos_vitales.temperatura}°C</span>}
                              </div>
                            )}
                            <div className="consulta-card-footer">
                              <span>👨‍⚕️ {c.medico_nombre || medico.nombre}</span>
                              {c.firmado && <span style={{color:'var(--verde)'}}>✓ Firmada</span>}
                            </div>
                            <div className="consulta-card-actions" onClick={e=>e.stopPropagation()}>
                              <button className="btn-mini" onClick={async()=>{
                                const docPdf = await generarConsultaPDF({medico, paciente:pac, consulta:c});
                                docPdf.save(`Consulta_${pac.nombre.replace(/\s/g,'_')}_${new Date(c.fecha).toISOString().split('T')[0]}.pdf`);
                              }} title="Imprimir consulta">🖨️ PDF</button>
                              {!c.firmado && (
                                <button className="btn-mini btn-mini-firma" onClick={async()=>{
                                  if(!medico.firma){alert('Configura tu firma en el perfil del médico primero');setShowPerfil(true);return;}
                                  if(!confirm('¿Firmar esta consulta? Una vez firmada no podrá editarse (NOM-024).')) return;
                                  const hash = await hashSHA256(JSON.stringify(c));
                                  await sb.from('citas').update({firmado:true,fecha_firma:new Date().toISOString(),firma_hash:hash}).eq('id',c.id);
                                  showSuccess('Consulta firmada electrónicamente');
                                  cargarHistorial(pac.id);
                                }} title="Firmar electrónicamente">✍️ Firmar</button>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* ── TAB CONSULTA LIBRE (DICTADO CHAT) ── */}
                {tab==="libre"&&(
                  <ConsultaLibre
                    paciente={pac}
                    onEstructurar={(textoLibre, extraidos)=>{
                      // ─── PROCESO DE PASO TEXTO → VARIABLES ───────────────
                      // Para cada sección del JSON extraído:
                      //   1. Generar texto combinado para secTextos[seccion]
                      //   2. Llenar cada campo individual en secCampos[campo]
                      let camposLlenos = 0;
                      const nuevosCampos = {};
                      const nuevosTextos = {};

                      Object.entries(extraidos).forEach(([seccionKey, campos])=>{
                        if(!campos || typeof campos !== 'object') return;

                        // Texto resumen de la sección (legible para el médico)
                        const lineas = Object.entries(campos)
                          .filter(([_,v]) => v !== null && v !== undefined && String(v).trim() !== '')
                          .map(([k,v]) => `• ${k.replace(/_/g,' ')}: ${String(v)}`);
                        if(lineas.length > 0){
                          nuevosTextos[seccionKey] = lineas.join('\n');
                        }

                        // Llenar campos individuales (clave: igual a la del input)
                        Object.entries(campos).forEach(([k,v])=>{
                          if(v !== null && v !== undefined && String(v).trim() !== ''){
                            nuevosCampos[k] = String(v);
                            camposLlenos++;
                          }
                        });
                      });

                      // Aplicar todos los cambios de una vez
                      setSecTextos(prev => ({...prev, ...nuevosTextos}));
                      setSecCampos(prev => ({...prev, ...nuevosCampos}));

                      showSuccess(`✓ ${camposLlenos} campo(s) llenado(s) con IA. Revisa la pestaña Estructurada.`);
                    }}
                    onIrAEstructurada={()=>setTab("consulta")}
                  />
                )}

                {/* ── TAB CONSULTA ── */}
                {tab==="consulta"&&(
                  <div style={{padding:0}}>
                    {!pac.expediente&&(
                      <div style={{margin:"12px 16px 0",background:"#FFF8E1",border:"1.5px solid #FFD54F",borderRadius:8,padding:"10px 14px",display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:20}}>⚠️</span>
                        <div>
                          <div style={{fontWeight:700,fontSize:13,color:"#E65100"}}>Sin expediente base</div>
                          <div style={{fontSize:12,color:"#795548"}}>Sin antecedentes registrados — ChatDoc tendrá menos contexto</div>
                        </div>
                      </div>
                    )}
                    <SeccionConsulta
                      secciones={SECCIONES}
                      secTextos={secTextos}
                      secCampos={secCampos}
                      onTexto={(k,v)=>setSecTextos(p=>({...p,[k]:v}))}
                      onCampo={(k,v)=>setSecCampos(p=>({...p,[k]:v}))}
                      onGuardar={guardarConsulta}
                      guardando={guardando}
                      guardado={guardado}
                    />
                  </div>
                )}

                {/* ── TAB ESTUDIOS ── */}
                {tab==="estudios"&&(
                  <div className="card-body">
                    <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>🧪 Análisis de Estudios Clínicos</div>
                    <div style={{fontSize:12,color:"#999",marginBottom:14}}>Pega texto de laboratorio o sube PDF/imagen</div>
                    <LabPaste paciente={pac} historial={pac.historial}/>
                  </div>
                )}

                {/* ── TAB HISTORIAL ── */}
                {tab==="historial"&&(
                  <div className="card-body">
                    {!pac.historial?.length?(
                      <div className="empty-state" style={{padding:"40px 20px"}}>
                        <div className="empty-icono">📂</div>
                        <div className="empty-titulo">Sin consultas previas</div>
                        <div className="empty-sub">Las consultas guardadas aparecerán aquí</div>
                        <button className="btn-primary" style={{marginTop:14}} onClick={()=>setTab("consulta")}>
                          → Ir a consulta
                        </button>
                      </div>
                    ):(
                      pac.historial.map((c,i)=><HistorialCard key={c.id} consulta={c} primero={i===0}/>)
                    )}
                  </div>
                )}
              </div>
            </>
          )}
        </main>
      </div>

      {/* CHATDOC FLOTANTE */}
      <ChatDoc paciente={pac} bloquesValores={secTextos} camposConsulta={secCampos} historial={pac?.historial}/>

      {/* MODAL PERFIL DEL MÉDICO */}
      {showPerfil && (
        <div className="modal-bg" onClick={()=>setShowPerfil(false)}>
          <div className="modal-card" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <h3>👨‍⚕️ Perfil del Médico</h3>
              <button className="modal-close" onClick={()=>setShowPerfil(false)}>✕</button>
            </div>
            <div className="modal-body">
              {/* Foto y datos básicos */}
              <div style={{display:"flex",gap:20,marginBottom:20}}>
                <div style={{width:120,height:120,borderRadius:"50%",background:"#00C9A7",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,color:"#fff",fontWeight:700,flexShrink:0}}>
                  {medico.foto
                    ? <img src={medico.foto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    : ini(medico.nombre)
                  }
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{medico.nombre}</div>
                  <div style={{fontSize:13,color:"#607D99",marginBottom:8}}>{medico.especialidad}</div>
                  <div style={{fontSize:12,color:"#607D99"}}>Cédula: <strong>{medico.cedula}</strong></div>
                  <div style={{fontSize:12,color:"#607D99"}}>📧 {medico.email}</div>
                  {medico.telefono && <div style={{fontSize:12,color:"#607D99"}}>📞 {medico.telefono}</div>}
                </div>
              </div>

              {/* Form de edición */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:"#607D99",letterSpacing:".05em",textTransform:"uppercase"}}>Foto (URL)</label>
                  <input type="text" defaultValue={medico.foto||''}
                    placeholder="https://..."
                    onChange={e=>setPerfilEdit(p=>({...p,foto_url:e.target.value}))}
                    style={{width:"100%",padding:"8px 10px",border:"1.5px solid #E2EBF5",borderRadius:8,fontSize:13}}
                  />
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:"#607D99",letterSpacing:".05em",textTransform:"uppercase"}}>Teléfono</label>
                  <input type="text" defaultValue={medico.telefono||''}
                    placeholder="+52 55 1234 5678"
                    onChange={e=>setPerfilEdit(p=>({...p,telefono:e.target.value}))}
                    style={{width:"100%",padding:"8px 10px",border:"1.5px solid #E2EBF5",borderRadius:8,fontSize:13}}
                  />
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:"#607D99",letterSpacing:".05em",textTransform:"uppercase"}}>Consultorio</label>
                  <input type="text" defaultValue={medico.consultorio_nombre||''}
                    placeholder="Nombre del consultorio"
                    onChange={e=>setPerfilEdit(p=>({...p,consultorio_nombre:e.target.value}))}
                    style={{width:"100%",padding:"8px 10px",border:"1.5px solid #E2EBF5",borderRadius:8,fontSize:13}}
                  />
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:"#607D99",letterSpacing:".05em",textTransform:"uppercase"}}>Horario</label>
                  <input type="text" defaultValue={medico.horario||''}
                    placeholder="Lun-Vie 9-18h"
                    onChange={e=>setPerfilEdit(p=>({...p,horario_atencion:e.target.value}))}
                    style={{width:"100%",padding:"8px 10px",border:"1.5px solid #E2EBF5",borderRadius:8,fontSize:13}}
                  />
                </div>
                <div style={{gridColumn:"1 / 3"}}>
                  <label style={{fontSize:11,fontWeight:600,color:"#607D99",letterSpacing:".05em",textTransform:"uppercase"}}>Dirección del consultorio</label>
                  <input type="text" defaultValue={medico.consultorio_direccion||''}
                    placeholder="Av. Insurgentes Sur 1234, CDMX"
                    onChange={e=>setPerfilEdit(p=>({...p,consultorio_direccion:e.target.value}))}
                    style={{width:"100%",padding:"8px 10px",border:"1.5px solid #E2EBF5",borderRadius:8,fontSize:13}}
                  />
                </div>
              </div>

              {/* Firma digital */}
              <div style={{padding:14,border:"1.5px dashed #00C9A7",borderRadius:10,background:"#F0FFFD",marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>✍️ Firma electrónica</div>
                {medico.firma
                  ? <img src={medico.firma} alt="Firma" style={{maxHeight:80,background:"#fff",border:"1px solid #E2EBF5",borderRadius:6,padding:4}}/>
                  : <div style={{fontSize:12,color:"#607D99",fontStyle:"italic"}}>Sin firma capturada</div>
                }
                <button className="btn-secondary" style={{marginTop:10,fontSize:12,padding:"6px 12px"}} onClick={()=>setShowFirma(true)}>
                  ✏️ {medico.firma ? 'Cambiar firma' : 'Capturar firma'}
                </button>
              </div>

              <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button className="btn-secondary" onClick={()=>setShowPerfil(false)}>Cancelar</button>
                <button className="btn-primary" onClick={async()=>{
                  if(Object.keys(perfilEdit).length === 0){setShowPerfil(false);return;}
                  const actualizado = await actualizarPerfilMedico(perfilEdit);
                  if(actualizado){
                    setMedico(m=>({...m,
                      foto: perfilEdit.foto_url || m.foto,
                      telefono: perfilEdit.telefono || m.telefono,
                      consultorio_nombre: perfilEdit.consultorio_nombre || m.consultorio_nombre,
                      consultorio_direccion: perfilEdit.consultorio_direccion || m.consultorio_direccion,
                      horario: perfilEdit.horario_atencion || m.horario,
                    }));
                    showSuccess('Perfil actualizado');
                    setPerfilEdit({});
                    setShowPerfil(false);
                  }
                }}>Guardar cambios</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* MODAL NUEVA RECETA */}
      {showReceta && pac && (
        <ModalReceta
          medico={medico}
          paciente={pac}
          onClose={()=>setShowReceta(false)}
          onSuccess={()=>showSuccess('Receta generada exitosamente')}
        />
      )}

      {/* MODAL FIRMA DIGITAL (canvas) */}
      {showFirma && (
        <ModalFirma
          onClose={()=>setShowFirma(false)}
          onSave={async (firmaDataURL)=>{
            const actualizado = await actualizarPerfilMedico({firma_digital: firmaDataURL});
            if(actualizado){
              setMedico(m=>({...m, firma: firmaDataURL}));
              showSuccess('Firma guardada exitosamente');
              setShowFirma(false);
            }
          }}
        />
      )}

      <style>{`
        :root{
          --rojo: #DC2626;
          --verde: #059669;
          --naranja: #D97706;
          --teal: #00C9A7;
          --teal-dark: #00A88C;
          --azul-primario: #00C9A7;
          --navy: #050C1A;
          --azul-marino: #050C1A;
          --teal-light: #E6FAF7;
          --azul-claro: #E6FAF7;
          --gris-fondo: #F5F7FA;
          --gris-borde: #E2E8F0;
          --gris-texto: #64748B;
          --gris-oscuro: #0F172A;
          --verde-bg: #D1FAE5;
          --rojo-bg: #FEE2E2;
          --naranja-bg: #FEF3C7;
          --cyan: #00C9A7;
        }
        input:focus,textarea:focus,select:focus{outline:none!important;border-color:#00C9A7!important}
        button:active{opacity:.88}

        /* ── RESUMEN: Cards superiores ── */
        .resumen-cards{
          display:grid;
          grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
          gap:14px;
          margin-bottom:20px;
        }
        .resumen-card{
          background:linear-gradient(135deg,#FFFFFF,#F8FBFD);
          border:1px solid #E2EBF5;
          border-radius:12px;
          padding:16px;
          box-shadow:0 2px 8px rgba(0,0,0,.04);
          transition:all .2s;
        }
        .resumen-card:hover{
          border-color:#00C9A7;
          box-shadow:0 4px 14px rgba(0,201,167,.12);
          transform:translateY(-2px);
        }
        .resumen-card-icono{font-size:24px;margin-bottom:6px}
        .resumen-card-label{
          font-size:11px;
          color:#607D99;
          letter-spacing:.05em;
          text-transform:uppercase;
          font-weight:600;
          margin-bottom:4px;
        }
        .resumen-card-valor{
          font-size:15px;
          font-weight:700;
          color:#0F1F3D;
        }

        /* ── RESUMEN: Grid de consultas ── */
        .consultas-grid{
          display:grid;
          grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
          gap:12px;
        }
        .consulta-card{
          background:#FFFFFF;
          border:1.5px solid #E2EBF5;
          border-radius:12px;
          padding:14px;
          cursor:pointer;
          transition:all .25s;
          display:flex;
          flex-direction:column;
          gap:8px;
        }
        .consulta-card:hover{
          border-color:#00C9A7;
          background:#F0FFFD;
          transform:translateY(-2px);
          box-shadow:0 6px 18px rgba(0,201,167,.15);
        }
        .consulta-card-header{
          display:flex;
          align-items:center;
          justify-content:space-between;
        }
        .consulta-card-fecha{
          font-size:13px;
          font-weight:700;
          color:#0F1F3D;
        }
        .consulta-badge{
          background:#00C9A7;
          color:#FFFFFF;
          font-size:10px;
          font-weight:700;
          padding:3px 8px;
          border-radius:12px;
          letter-spacing:.05em;
          text-transform:uppercase;
        }
        .consulta-card-dx{
          font-size:13px;
          color:#0F1F3D;
          font-weight:500;
          line-height:1.4;
          min-height:36px;
        }
        .consulta-card-signos{
          display:flex;
          flex-wrap:wrap;
          gap:8px;
          font-size:11px;
          color:#607D99;
          padding:6px 0;
          border-top:1px dashed #E2EBF5;
        }
        .consulta-card-footer{
          display:flex;
          align-items:center;
          justify-content:space-between;
          font-size:11px;
          color:#607D99;
          padding-top:6px;
          border-top:1px dashed #E2EBF5;
        }
        .consulta-card-actions{
          display:flex;
          gap:6px;
          padding-top:8px;
          margin-top:4px;
        }
        .btn-mini{
          flex:1;
          background:#F5F9FF;
          border:1px solid #E2EBF5;
          color:#0F1F3D;
          padding:6px 10px;
          border-radius:6px;
          font-size:11px;
          font-weight:600;
          cursor:pointer;
          transition:all .15s;
        }
        .btn-mini:hover{
          background:#E6FAF7;
          border-color:#00C9A7;
        }
        .btn-mini-firma{
          background:#FFF8E1;
          border-color:#FFCA28;
          color:#E65100;
        }
        .btn-mini-firma:hover{
          background:#FFE082;
          border-color:#FFA000;
        }

        /* ── ANIMACIÓN PULSE (indicador REC) ── */
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50%      { opacity: 0.5; transform: scale(1.3); }
        }

        /* ── MODALES ── */
        .modal-bg{
          position:fixed;inset:0;background:rgba(15,31,61,.6);
          display:flex;align-items:center;justify-content:center;z-index:9999;
          backdrop-filter:blur(4px);padding:20px;
        }
        .modal-card{
          background:#fff;border-radius:16px;width:100%;max-width:560px;
          max-height:90vh;overflow-y:auto;
          box-shadow:0 20px 60px rgba(0,0,0,.3);
        }
        .modal-head{
          display:flex;align-items:center;justify-content:space-between;
          padding:18px 24px;border-bottom:1px solid #E2EBF5;
        }
        .modal-head h3{margin:0;font-size:18px;color:#0F1F3D}
        .modal-close{
          background:transparent;border:none;font-size:22px;
          color:#607D99;cursor:pointer;padding:4px 10px;border-radius:6px;
        }
        .modal-close:hover{background:#F5F9FF;color:#DC2626}
        .modal-body{padding:24px}
        .btn-secondary{
          background:#F5F9FF;color:#0F1F3D;border:1.5px solid #E2EBF5;
          padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;
          cursor:pointer;transition:all .2s;
        }
        .btn-secondary:hover{border-color:#00C9A7;background:#E6FAF7}

        @media print{
          header,.sidebar,.chatdoc-btn,.chatdoc-panel,.tabs{display:none!important}
          .main{padding:0}
        }
      `}</style>
    </div>
  );
}

// ── Fix variables CSS en JSX ─────────────────────────────────────
const var_rojo = "#DC2626";
const var_verde = "#059669";

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
